spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:seckill}?useSSL=${MYSQL_USE_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      maximum-pool-size: ${MYSQL_MAX_POOL_SIZE:20}
      minimum-idle: ${MYSQL_MIN_IDLE:5}
      connection-timeout: ${MYSQL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${MYSQL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${MYSQL_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    validate-on-migrate: true
    clean-disabled: true

management:
  health:
    db:
      enabled: true
