spring:
  application:
    name: seckill
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration/{vendor}
    baseline-on-migrate: true

management:
  health:
    rabbit:
      enabled: false
    redis:
      enabled: false
    redis-reactive:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

seckill:
  protection:
    enabled: true
    captcha-ttl-seconds: 120
    access-token-ttl-seconds: 60
    captcha-rate-limit-requests: 5
    captcha-rate-limit-window-seconds: 60
    access-token-rate-limit-requests: 5
    access-token-rate-limit-window-seconds: 60
    purchase-rate-limit-requests: 3
    purchase-rate-limit-window-seconds: 10
  rabbitmq:
    enabled: false
    exchange: seckill.order.exchange
    queue: seckill.order.queue
    routing-key: seckill.order.create
    dead-letter-exchange: seckill.order.dlx
    dead-letter-queue: seckill.order.queue.dlq
    dead-letter-routing-key: seckill.order.dead
    observability:
      enabled: true
      queue-depth-poll-interval-millis: 5000
  async:
    recovery:
      enabled: true
      stale-threshold-seconds: 300
      batch-limit: 50
      fixed-delay-millis: 60000
  redis:
    fallback-alert:
      enabled: true
      window-seconds: 300
      threshold: 3
    compensation-recovery:
      enabled: true
      fixed-delay-millis: 60000
      batch-limit: 50
      retry-delay-seconds: 60
      max-attempts: 10
