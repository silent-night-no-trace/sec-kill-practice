spring:
  datasource:
    url: jdbc:h2:mem:seckill;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    properties:
      hibernate:
        format_sql: true

seckill:
  protection:
    enabled: true
  redis:
    enabled: false
  rabbitmq:
    enabled: false
